<!-- Promo Modal -->
<div class="promo-modal" data-promo-modal hidden aria-hidden="true" aria-modal="true" role="dialog" aria-labelledby="promo-modal-title">
    <div class="promo-modal__backdrop" data-promo-close></div>

    <div class="promo-modal__card">

        <button class="promo-modal__close" data-promo-close aria-label="Close promo">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>

        <p class="promo-modal__eyebrow">Limited-Time Offers</p>
        <h2 class="promo-modal__title" id="promo-modal-title">Don't Miss Out on These Deals</h2>

        <div class="promo-modal__deals">

            <!-- Deal 1: Early Bird -->
            <div class="promo-modal__deal promo-modal__deal--early-bird">
                <div class="promo-modal__deal-badge">Early Bird</div>
                <h3 class="promo-modal__deal-headline">May 1st Early Bird Pricing</h3>
            </div>

            <div class="promo-modal__divider" aria-hidden="true"></div>

            <!-- Deal 2: 50/50/50 -->
            <div class="promo-modal__deal promo-modal__deal--fifty">
                <div class="promo-modal__deal-badge promo-modal__deal-badge--gold">50/50/50</div>
                <h3 class="promo-modal__deal-headline">First 50 Guys in Each State Save $50</h3>
            </div>

            <div class="promo-modal__divider" aria-hidden="true"></div>

            <!-- Deal 3: Group Rate -->
            <div class="promo-modal__deal promo-modal__deal--group">
                <div class="promo-modal__deal-badge promo-modal__deal-badge--green">Group Rate</div>
                <h3 class="promo-modal__deal-headline">15% Off — Bring Your Bros or Men&apos;s Ministry</h3>
            </div>

            <div class="promo-modal__divider" aria-hidden="true"></div>

            <!-- Deal 4: VIP Pastor Experience -->
            <div class="promo-modal__deal promo-modal__deal--pastor">
                <div class="promo-modal__deal-badge promo-modal__deal-badge--navy">VIP Pastor</div>
                <h3 class="promo-modal__deal-headline">VIP Pastor Experience — 25% Off</h3>
            </div>

            <a class="promo-modal__deal-link" href="/tickets#current-deals">See All Deal Details &rarr;</a>

        </div>

        <a class="promo-modal__cta" href="https://brushfire.com/gracecitychurch/FreedomCon26/628938/tickets">Grab Your Ticket Now</a>

        <div class="promo-modal__suppress">
            <label class="promo-modal__suppress-label">
                <input class="promo-modal__suppress-check" type="checkbox" id="promo-suppress">
                <span>Don't show this again</span>
            </label>
        </div>

    </div>
</div>
