{% macro artist_audio(img_src, img_alt, audio_src, audio_title, audio_type="audio/mpeg") %}
<section class="audio-section">
    <img src="{{ img_src }}" alt="{{ img_alt }}" style="width:100%;display:block;">

    <div class="artist-audio" data-artist-audio>
        <button class="btn btn-primary btn-xxl artist-play-btn" type="button"
            data-artist-audio-toggle aria-expanded="false"
            {% if not audio_src %}disabled{% endif %}>
            {% if audio_src %}Play Song{% else %}Song Coming Soon{% endif %}
        </button>

        <div class="artist-audio__panel" data-artist-audio-panel hidden>
            <div class="artist-audio__head">
                <p class="artist-audio__title">{{ audio_title }}</p>
                <button class="artist-audio__close" type="button"
                    aria-label="Close audio player" data-artist-audio-close>&times;</button>
            </div>
            <audio controls preload="metadata" class="artist-audio__native" data-artist-audio-player>
                {% if audio_src %}
                <source src="{{ audio_src }}" type="{{ audio_type }}">
                {% endif %}
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>
</section>
{% endmacro %}
