<h1 class="visually-hidden">Freedom Con 2026 at The Gorge Amphitheatre</h1>
<section class="bg-black overflow-hidden" aria-label="Freedom Con hero">

  <!-- Freedom Con title / logo – full width across top -->
  <picture>
    <source srcset="{{ url_for('static', filename='img/freedom_con_congress.webp') }}" type="image/webp">
    <img class="d-block mx-auto img-fluid pt-3 pt-md-4"
         style="max-width: min(92vw, 1100px);"
         src="{{ url_for('static', filename='img/freedom_con_congress.png') }}"
         alt="Freedom Con – An American Congress of Christian Men">
  </picture>

  <!-- Two-column split: lineup photo left, event info right -->
  <div class="d-flex flex-column flex-lg-row align-items-md-stretch">

    <!-- Left: speakers / guys photo -->
    <div class="flex-md-fill" style="flex-basis: 52%;">
      <picture>
        <source srcset="{{ url_for('static', filename='img/guys_rise_of_the_statesmen.webp') }}" type="image/webp">
        <img class="d-block w-100 h-100 object-fit-cover"
             src="{{ url_for('static', filename='img/guys_rise_of_the_statesmen.png') }}"
             alt="Freedom Con speakers lineup – Rise of the Statesman">
      </picture>
    </div>

    <!-- Right: event info + CTAs -->
    <div class="d-flex flex-column justify-content-center align-items-center text-center text-white
                px-3 px-md-4 py-4 py-md-5 gap-2"
         style="flex-basis: 48%;">
      <h2 class="text-uppercase fw-bold lh-1 mb-1"
          style="font-family:'Oswald',sans-serif; font-size:clamp(2rem,3.5vw,4rem);">
        One Historic Event
      </h2>
      <p class="text-uppercase text-white-50 ls-wide mb-1"
         style="font-size:clamp(0.7rem,1.2vw,0.95rem); letter-spacing:0.18em;">
        The Gorge Amphitheatre&nbsp;&nbsp;|&nbsp;&nbsp;George, Washington
      </p>
      <p class="text-uppercase fw-light lh-1 mb-2"
         style="font-family:'Oswald',sans-serif; font-size:clamp(2.5rem,4.5vw,5rem);
                border-bottom: 3px solid #BC2A27; padding-bottom:0.1em;">
        June 19&nbsp;–&nbsp;20
      </p>
      <div class="d-flex gap-2">
        <a class="btn btn-primary btn-lg px-4" href="/tickets">Get Tickets</a>
        <a class="btn btn-secondary btn-lg px-4" href="#trailers">View Trailer</a>
      </div>
    </div>

  </div>
</section>
