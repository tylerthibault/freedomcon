<style>
    .crowder-section {
        position: relative;
    }
    .crowder-audio {
        position: absolute;
        bottom: 1.5rem;
        left: 30%;
        /* transform: translateX(-50%); */
        z-index: 10;
    }
    .crowder-play-btn:active {
        opacity: 0;
    }
    .crowder-audio__panel {
        background: #111;
        color: #fff;
        border-radius: 8px;
        padding: 1rem 1rem 0.75rem;
        width: min(90vw, 380px);
        position: fixed;
        bottom: 1.5rem;
        left: 50%;
        transform: translateX(-50%);
        z-index: 1000;
        box-shadow: 0 4px 24px rgba(0,0,0,0.7);
    }
    .crowder-audio__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 0.6rem;
    }
    .crowder-audio__title {
        margin: 0;
        font-weight: 700;
        font-size: 1rem;
        letter-spacing: 0.05em;
    }
    .crowder-audio__close {
        background: none;
        border: none;
        color: #888;
        font-size: 1.4rem;
        line-height: 1;
        cursor: pointer;
        padding: 0 0 0 0.75rem;
        transition: color 0.15s;
    }
    .crowder-audio__close:hover { color: #fff; }
    .crowder-audio__native { width: 100%; display: block; }
    @media  (max-width: 425px) {
        .crowder-audio {
            left: 10%;
        }
    }
    @media (min-width: 1024px) {
        .crowder-audio {
            left: 40%;
        }
    }
</style>

<section class="crowder-section">
    {% set crowder_audio_src = "https://pub-fc470c82f793409f9e6c126deeb0387d.r2.dev/02_Grave%20Robber.wav" %}
    {% set crowder_audio_title = "Grave Robber" %}
    <img src="{{ url_for('static', filename='img/crowder_section.png') }}" alt="Crowder – Live at Freedom Con"
        style="width:100%;display:block;">

    <div class="crowder-audio" data-crowder-audio>
        <button class="btn btn-primary btn-xxl crowder-play-btn" type="button" data-crowder-audio-toggle aria-expanded="false" {% if not
            crowder_audio_src %}disabled{% endif %}>
            {% if crowder_audio_src %}Play Song{% else %}Song Coming Soon{% endif %}
        </button>
        <div class="crowder-audio__panel" data-crowder-audio-panel hidden>
            <div class="crowder-audio__head">
                <p class="crowder-audio__title">{{ crowder_audio_title }}</p>
                <button class="crowder-audio__close" type="button" aria-label="Close audio player"
                    data-crowder-audio-close>&times;</button>
            </div>
            <audio controls preload="none" class="crowder-audio__native" data-crowder-audio-player>
                {% if crowder_audio_src %}
                <source src="{{ crowder_audio_src }}" type="audio/wav">
                {% endif %}
                Your browser does not support the audio element.
            </audio>
        </div>
    </div>
</section>

<section>
    <img src="{{ url_for('static', filename='img/danny_section.png') }}" alt="Danny Gokey" class="w-100">
</section>

<script>
  document.querySelector('[data-crowder-audio-toggle]').addEventListener('click', function () {
    this.style.display = 'none';
  });
  document.querySelector('[data-crowder-audio-close]').addEventListener('click', function () {
    var panel = document.querySelector('[data-crowder-audio-panel]');
    var toggle = document.querySelector('[data-crowder-audio-toggle]');
    if (panel && toggle) {
      panel.hidden = true;
      toggle.style.display = '';
      var player = document.querySelector('[data-crowder-audio-player]');
      if (player) {
        player.pause();
        player.currentTime = 0;
      }
    }
  });
</script>
