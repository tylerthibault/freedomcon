{% set josh = invite.from_josh %}
<section class="josh-letter" aria-label="A word from Josh McPherson" id="from-josh">
	<div class="josh-letter__inner container-xl">

		<header class="josh-letter__header">
			<p class="josh-letter__eyebrow">{{ josh.eyebrow }}</p>
			<h2 class="josh-letter__name">{{ josh.title }}</h2>
		</header>

		<div class="josh-letter__columns">
			<div class="josh-letter__col">
				{% for paragraph in josh.letter_col_1 %}
				<p class="josh-letter__p">{{ paragraph | safe }}</p>
				{% endfor %}
			</div>
			<div class="josh-letter__col">
				{% for paragraph in josh.letter_col_2 %}
				<p class="josh-letter__p">{{ paragraph | safe }}</p>
				{% endfor %}
				<p class="josh-letter__signature">{{ josh.signature }}</p>
				<a class="josh-letter__cta btn-primary" href="{{ josh.cta_href }}">{{ josh.cta_label }}</a>
			</div>
		</div>
	</div>
</section>
