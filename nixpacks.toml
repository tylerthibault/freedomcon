[variables]
PYTHONUNBUFFERED = "1"

[phases.setup]
nixPkgs = ["python311", "python311Packages.pip"]

[phases.install]
cmds = [
	"python -m venv /opt/venv",
	"/opt/venv/bin/pip install --no-cache-dir -r requirements.txt"
]

[phases.build]
cmds = [
	"/opt/venv/bin/python build.py"
]

[start]
cmd = "/opt/venv/bin/gunicorn run:app --bind 0.0.0.0:${PORT:-8000} --workers 2 --threads 4 --timeout 120"
